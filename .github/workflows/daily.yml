name: Edición diaria

on:
  schedule:
    # Objetivo: publicar a partir de las 09:00 Europe/Madrid todo el año. GitHub
    # Actions retrasa u OMITE ejecuciones programadas cuando la plataforma está
    # cargada (sin error ni aviso), así que no basta con uno o dos disparos: se
    # lanzan varios reintentos horarios. El guardián de más abajo solo deja
    # publicar cuando en Madrid ya son las 09:00, y la idempotencia por fichero
    # (data/AAAA-MM-DD.json) hace que solo el primer intento válido genere la
    # edición; los demás salen en segundos sin gastar LLM ni crear commits.
    # 07:09 UTC = 09:09 en verano (CEST); 08:09 UTC = 09:09 en invierno (CET).
    - cron: "9 7 * * *"
    - cron: "9 8 * * *"
    - cron: "9 9 * * *"
    - cron: "9 10 * * *"
    - cron: "9 11 * * *"
  workflow_dispatch:
    inputs:
      skip_pipeline:
        description: "Solo reconstruir y desplegar el sitio, sin regenerar la edición"
        type: boolean
        default: false

concurrency:
  group: diario-ia
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

jobs:
  edicion:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ventana horaria (publicar a partir de las 09:00 Europe/Madrid)
        id: guard
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Disparo manual: se ejecuta sin comprobar la hora."
            exit 0
          fi
          hora=$((10#$(TZ='Europe/Madrid' date +%H)))
          if [ "$hora" -ge 9 ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "En Madrid son >= las 09:00 (hora $hora): se ejecuta."
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "En Madrid aún no son las 09:00 (hora $hora): se omite hasta el siguiente cron."
          fi

      - name: Configurar Node
        if: steps.guard.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Instalar dependencias
        if: steps.guard.outputs.run == 'true'
        run: npm ci

      - name: Ejecutar pipeline (recogida, enriquecimiento, curación, posts)
        if: steps.guard.outputs.run == 'true' && ! inputs.skip_pipeline
        env:
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'deepseek' }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: npm run pipeline

      - name: Construir sitio (Eleventy)
        if: steps.guard.outputs.run == 'true'
        run: npm run build

      - name: Commit de la edición del día
        if: steps.guard.outputs.run == 'true'
        run: |
          git config user.name "deepseek-v4"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "Sin cambios en data/: no se crea commit."
          else
            git commit -m "edición $(TZ='Europe/Madrid' date +%Y-%m-%d)"
            # Integra cambios remotos aparecidos durante la ejecución antes de
            # publicar, para que un push concurrente no tumbe la edición.
            git pull --rebase origin main
            git push
          fi

      - name: Configurar Pages
        if: steps.guard.outputs.run == 'true'
        uses: actions/configure-pages@v5

      - name: Subir artefacto de Pages
        if: steps.guard.outputs.run == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Desplegar en GitHub Pages
        id: deploy
        if: steps.guard.outputs.run == 'true'
        uses: actions/deploy-pages@v4

      - name: Abrir issue si el workflow falla
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const run = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Fallo en la edición diaria (${new Date().toISOString().slice(0,10)})`,
              body: [
                "El workflow **Edición diaria** ha fallado y no se ha publicado una edición nueva.",
                "",
                `- Run: ${run}`,
                "- Revisa los logs del job para el error concreto (recogida, enriquecimiento, curación, posts o deploy).",
                "- Si el cron dejó de dispararse sin motivo, comprueba si GitHub deshabilitó el workflow por inactividad (60 días).",
              ].join("\n"),
              labels: ["fallo-automatico"],
            });
